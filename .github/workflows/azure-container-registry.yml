# This workflow will build and push a Docker image to Azure Container Registry.
#
# To use this workflow, you will need to create the following secrets in your
# GitHub repository:
#
#   AZURE_CREDENTIALS: A JSON object with the credentials of an Azure service
#                      principal. For example:
#
#    1
#
#   ACR_USERNAME: The username to use to log in to your Azure Container
#                 Registry. This is often the same as the client ID of your
#                 service principal.
#
#   ACR_PASSWORD: The password to use to log in to your Azure Container
#                 Registry. This is often the same as the client secret of
#                 your service principal.

name: Build and Push to ACR

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: 'Checkout GitHub Action'
      uses: actions/checkout@v3

    - name: Get short SHA
      id: sha
      run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: 'Login to Azure'
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: 'Login to Azure Container Registry'
      uses: docker/login-action@v2
      with:
        registry: exploressaddle.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: 'Build and push Docker image'
      uses: docker/build-push-action@v3
      with:
        context: .
        push: true
        tags: exploressaddle.azurecr.io/exploreapp:latest

    - name: 'Deploy to Azure Container App'
      uses: azure/container-apps-deploy-action@v1
      with:
        containerAppName: app-test
        resourceGroup: azure26
        imageToDeploy: exploressaddle.azurecr.io/exploreapp:latest
        acrName: exploressaddle
        acrUsername: ${{ secrets.ACR_USERNAME }}
        acrPassword: ${{ secrets.ACR_PASSWORD }}
        environmentVariables: 'GIT_SHA=${{ steps.sha.outputs.sha }}'
